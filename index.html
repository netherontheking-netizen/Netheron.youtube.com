<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netheron - Minecraft World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                        url('https://images.alphacoders.com');
            background-size: cover;
            background-position: center;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            margin-bottom: 10px;
            text-shadow: 6px 6px 0px #373737;
            letter-spacing: 8px;
        }

        p {
            font-size: 1.5rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 30px;
            border: 2px solid #555;
            display: inline-block;
        }

        .sub-button {
            display: inline-block;
            margin-top: 30px;
            background-color: #5d5d5d;
            color: white;
            text-decoration: none;
            padding: 20px 50px;
            font-size: 2rem;
            font-weight: bold;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0px #373737, inset 4px 4px 0px #ababab;
            transition: all 0.1s;
        }

        .sub-button:hover {
            background-color: #ff0000;
            box-shadow: inset -4px -4px 0px #8b0000, inset 4px 4px 0px #ff4545;
            transform: scale(1.05);
        }

        /* כפתור מוזיקה קטן בפינה */
        .music-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border: 1px solid #fff;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body onclick="playMusic()">

    <h1>NETHERON</h1>
    <p>ערוץ המיינקראפט הרשמי</p>
    
    <br>

    <a href="https://www.youtube.com" target="_blank" class="sub-button">
        SUBSCRIBE
    </a>

    <div class="music-control">🔊 לחץ בכל מקום להפעלת מוזיקה</div>

    <!-- אודיו מרחוק (C418 - Aria Math) -->
    <audio id="mcAudio" loop>
        <source src="https://www.soundboard.com" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            var audio = document.getElementById("mcAudio");
            audio.play();
            document.querySelector(".music-control").innerHTML = "🎶 מנגן כעת...";
        }
    </script>

</body>
</html>
